# Fictional Uralic-style phonology. Contains no words, names, stems, or affixes.
segments = P B T D K G F V S H M N NG L R J PP TT KK SS MM NN LL A O U E I AE OE UE

feature type consonant = P B T D K G F V S H M N NG L R J PP TT KK SS MM NN LL
feature type vowel = A O U E I AE OE UE
feature manner stop = P B T D K G PP TT KK
feature manner fricative = F V S H SS
feature manner nasal = M N NG MM NN
feature manner liquid = L R LL
feature manner glide = J
feature place labial = P B F V M PP MM
feature place coronal = T D S N L R J TT SS NN LL
feature place dorsal = K G H NG KK
feature harmony back = A O U
feature harmony front = AE OE UE
feature harmony neutral = E I
feature length geminate = PP TT KK SS MM NN LL

spell AE = Ä
spell OE = Ö
spell UE = Ü

start = NAME

# Harmony and word shape are both selected at the top level, before optimization.
rule NAME = 10: @B2 | 10: @F2 | 24: @B3 | 22: @F3 | 8: @B4 | 8: @F4 | 9: @BGEM | 9: @FGEM
rule B2 = 1: @O @VB . @MED @VB @FC
rule F2 = 1: @O @VF . @MED @VF @FC
rule B3 = 1: @O @VB . @MED @VB . @MED @VB @FC
rule F3 = 1: @O @VF . @MED @VF . @MED @VF @FC
rule B4 = 1: @O @VB . @MED @VB . @MED @VB . @MED @VB @FC
rule F4 = 1: @O @VF . @MED @VF . @MED @VF . @MED @VF @FC
rule BGEM = 1: @O @VB . @GEM @VB . @MED @VB @FC
rule FGEM = 1: @O @VF . @GEM @VF . @MED @VF @FC
rule O = 2: P | 1: B | 3: T | 1: D | 3: K | 1: G | 2: F | 2: V | 3: S | 1: H | 3: M | 4: N | 2: NG | 4: L | 3: R | 2: J
rule MED = 4: P | 2: B | 4: T | 2: D | 4: K | 2: G | 3: F | 3: V | 4: S | 1: H | 4: M | 5: N | 2: NG | 5: L | 4: R | 3: J
rule GEM = 2: PP | 2: TT | 2: KK | 1: SS | 1: MM | 2: NN | 1: LL
rule FC = 4: N | 2: NG | 4: L | 3: R | 3: S | 2: T | 2: K | 1: M
rule VB = 4: A | 3: O | 2: U | 2: E | 3: I
rule VF = 4: AE | 3: OE | 2: UE | 2: E | 3: I

hard no-repeat type vowel
hard max-run type consonant 1
hard max length geminate 1

soft repeat type consonant 2
soft excess harmony neutral 1 2
