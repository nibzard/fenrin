# Fictional Classical-Roman-style phonology. Contains no words, names, or endings.
segments = P B T D K G F V S H M N L R A E I O U

feature type consonant = P B T D K G F V S H M N L R
feature type vowel = A E I O U
feature manner stop = P B T D K G
feature manner fricative = F V S H
feature manner nasal = M N
feature manner liquid = L R
feature place labial = P B F V M
feature place coronal = T D S N L R
feature place dorsal = K G
feature place laryngeal = H

spell K = C

start = NAME

rule NAME = 10: @O2 @V . @FIN | 50: @O @V . @O @V . @FIN | 4: @O @V . @O @V . @O @EV | 10: @O2 @V . @O @V . @FIN | 8: @O @V @MC . @O @V . @FIN | 12: @O @V . @O @V . @O @V . @FIN | 6: @O @V . @O @V @MC . @FIN
rule O = 3: P | 1: B | 4: T | 2: D | 4: K | 2: G | 2: F | 1: V | 4: S | 1: H | 3: M | 4: N | 4: L | 4: R
rule O2 = 3: @LABSTOP @LIQ | 3: @DORSTOP @LIQ | 2: @CORSTOP R | 2: F @LIQ | 1: S @VSTOP
rule LABSTOP = 1: P | 1: B
rule DORSTOP = 1: K | 1: G
rule CORSTOP = 1: T | 1: D
rule LIQ = 1: L | 1: R
rule VSTOP = 1: P | 1: T | 1: K
rule V = 3: A | 3: E | 2: I | 3: O | 1: U
rule MC = 4: N | 3: S | 1: M
rule FIN = 10: @O @FV @FC | 5: @O I . @FV @FC | 3: @O @EV
rule FV = 6: U | 2: E | 1: I | 1: A
rule EV = 3: A | 2: O | 1: E
rule FC = 7: S | 4: M

rewrite N . P -> M . P
rewrite N . B -> M . B

hard no-repeat type vowel
hard max-run type consonant 2
hard forbid [manner=stop] [manner=stop]
hard forbid [type=consonant] H

soft repeat type consonant 3
soft excess manner stop 3 2
