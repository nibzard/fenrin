# Fictional Slavic-style phonology. Contains no words, names, or suffixes.
segments = P B T D K G F V S Z H SH ZH CH TS M N L R J A E I O U Y

feature type consonant = P B T D K G F V S Z H SH ZH CH TS M N L R J
feature type vowel = A E I O U Y
feature manner stop = P B T D K G
feature manner fricative = F V S Z H SH ZH
feature manner affricate = CH TS
feature manner nasal = M N
feature manner liquid = L R
feature manner glide = J
feature place labial = P B F V M
feature place coronal = T D S Z SH ZH CH TS N L R J
feature place dorsal = K G
feature place laryngeal = H
feature marked yes = SH ZH CH TS J Y

spell J = Y

start = NAME

rule NAME = 46: @O @VOW . @O @VOW . @O @VOW @FC | 8: @O @VOW . @O @VOW . @O @VOW | 16: @O2 @VOW . @O @VOW @FC | 8: @O2 @VOW . @O @VOW . @O @VOW @FC | 14: @O @VOW . @O @VOW @FC2 | 6: @O @VOW . @O @VOW . @O @VOW @FC2 | 2: @O @VOW . @O @VOW . @O @VOW . @O @VOW @FC
rule O = 2: P | 2: B | 3: T | 2: D | 3: K | 1: G | 1: F | 2: V | 3: S | 2: Z | 1: H | 1: SH | 1: ZH | 1: CH | 1: TS | 2: M | 3: N | 3: L | 4: R | 1: J
rule O2 = 4: @LABSTOP @LIQ | 4: @DORSTOP @LIQ | 2: @CORSTOP R | 3: S @VSTOP | 2: Z @VDSTOP | 2: S @SSON | 1: Z V | 1: V R
rule LABSTOP = 1: P | 1: B
rule DORSTOP = 1: K | 1: G
rule CORSTOP = 1: T | 1: D
rule LIQ = 1: L | 1: R
rule VSTOP = 1: P | 1: T | 1: K
rule VDSTOP = 1: B | 1: D | 1: G
rule SSON = 1: L | 1: M | 1: N | 1: V
rule VOW = 3: A | 2: E | 2: I | 3: O | 1: U | 1: Y
rule FC = 3: K | 4: N | 3: R | 4: S | 3: T | 1: V | 2: Z | 1: SH | 1: CH
rule FC2 = 3: N K | 2: N D | 2: R D | 2: R K | 2: S K | 2: S T | 1: Z D | 1: L K | 1: L T

rewrite S I -> SH I
rewrite Z I -> ZH I
rewrite T I -> TS I
rewrite K I -> CH I

hard max marked yes 3
hard no-repeat type vowel
hard max-run type consonant 2
hard forbid [manner=stop] [manner=stop]

soft repeat type consonant 3
soft excess marked yes 1 2
soft sequence 3 [manner=fricative] [manner=fricative]
