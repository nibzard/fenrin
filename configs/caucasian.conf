# Fictional Caucasian-style phonology. Contains no words, names, stems, or affixes.
segments = P B T D K G Q P_E T_E K_E Q_E TS DZ CH J TS_E CH_E S Z SH ZH X GH H M N NG L R W Y A E I O U

feature type consonant = P B T D K G Q P_E T_E K_E Q_E TS DZ CH J TS_E CH_E S Z SH ZH X GH H M N NG L R W Y
feature type vowel = A E I O U
feature manner stop = P B T D K G Q P_E T_E K_E Q_E
feature manner affricate = TS DZ CH J TS_E CH_E
feature manner fricative = S Z SH ZH X GH H
feature manner nasal = M N NG
feature manner liquid = L R
feature manner glide = W Y
feature place labial = P B P_E M W
feature place coronal = T D T_E TS DZ CH J TS_E CH_E S Z SH ZH N L R Y
feature place dorsal = K G Q K_E Q_E X GH NG
feature place laryngeal = H
feature airstream ejective = P_E T_E K_E Q_E TS_E CH_E
feature marked yes = Q P_E T_E K_E Q_E TS_E CH_E X GH

spell P_E = P'
spell T_E = T'
spell K_E = K'
spell Q_E = Q'
spell TS_E = TS'
spell CH_E = CH'

start = NAME

rule NAME = 12: @O @V . @O @V @FC | 34: @O @V . @O @V . @O @V @FC | 4: @O @V . @O @V . @O @V | 20: @O2 @V . @O @V . @O @V @FC | 14: @O @V . @O2 @V . @O @V @FC | 8: @O @V . @O @V . @O @V . @O @V @FC | 8: @O2 @V . @O @V . @O @V . @O @V @FC
rule O = 3: P | 1: B | 4: T | 1: D | 4: K | 1: G | 3: Q | 2: P_E | 2: T_E | 2: K_E | 2: Q_E | 3: TS | 1: DZ | 3: CH | 1: J | 1: TS_E | 1: CH_E | 3: S | 1: Z | 3: SH | 1: ZH | 3: X | 2: GH | 2: H | 3: M | 4: N | 3: NG | 4: L | 4: R | 2: W | 2: Y
rule O2 = 4: @PSTOP @LIQ | 3: @ESTOP @LIQ | 3: S @VSTOP | 2: SH @VSTOP | 2: @DORSAL @GLIDE | 1: @FRIC @LIQ
rule PSTOP = 2: P | 1: B | 2: T | 1: D | 2: K | 1: G | 2: Q
rule ESTOP = 1: P_E | 1: T_E | 1: K_E | 1: Q_E
rule VSTOP = 1: P | 1: T | 1: K | 1: Q
rule DORSAL = 2: K | 1: G | 2: Q | 1: K_E | 1: Q_E | 1: X | 1: GH
rule FRIC = 2: S | 2: SH | 1: X | 1: GH
rule LIQ = 1: L | 1: R
rule GLIDE = 1: W | 1: Y
rule FC = 4: N | 3: NG | 4: L | 4: R | 3: S | 2: SH | 2: X | 2: T | 2: K | 2: Q | 1: M
rule V = 4: A | 3: E | 2: I | 3: O | 2: U

hard no-repeat type vowel
hard max-run type consonant 2
hard max airstream ejective 2
hard max marked yes 3
hard forbid [airstream=ejective] [airstream=ejective]

soft repeat type consonant 2
soft excess marked yes 1 2
