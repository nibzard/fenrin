# Fictional Japanese-style phonology. Contains no words, names, or mora list.
segments = P B T D K G S Z H M N R Y W A I U E O SH CH TS F J

feature type consonant = P B T D K G S Z H M N R Y W SH CH TS F J
feature type vowel = A I U E O
feature manner stop = P B T D K G
feature manner fricative = S Z H SH F
feature manner affricate = CH TS J
feature manner nasal = M N
feature manner liquid = R
feature manner glide = Y W
feature place labial = P B M W F
feature place coronal = T D S Z N R SH CH TS J
feature place dorsal = K G Y
feature place laryngeal = H
feature derived yes = SH CH TS F J

start = NAME

rule NAME = 55: @INIT . @MORA . @MORA | 28: @INIT . @MORA . @MORA . @MORA | 12: @INIT . @MORA . @MORA N | 5: @INIT . @MORA . @MORA . @MORA N
rule INIT = 14: @C @V | 1: @V | 2: @GLIDEMORA
rule MORA = 16: @C @V | 2: @GLIDEMORA
rule GLIDEMORA = 2: Y @YV | 1: W @WV
rule C = 4: K | 2: G | 3: S | 1: Z | 3: T | 1: D | 3: N | 2: H | 1: B | 1: P | 3: M | 4: R
rule V = 3: A | 2: I | 2: U | 1: E | 3: O
rule YV = 2: A | 1: U | 2: O
rule WV = 2: A | 1: O

rewrite S I -> SH I
rewrite T I -> CH I
rewrite T U -> TS U
rewrite H U -> F U
rewrite Z I -> J I
rewrite D I -> J I
rewrite D U -> Z U

hard no-repeat type vowel
hard max-run type consonant 1

soft repeat type consonant 3
soft excess derived yes 1 2
