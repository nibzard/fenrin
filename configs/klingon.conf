# Fictional Klingon-style phonology. Contains no vocabulary or canonical names.
segments = B CH D GH H J L M N NG P Q QH R S T TLH V W Y GLOT A E I O U

feature type consonant = B CH D GH H J L M N NG P Q QH R S T TLH V W Y GLOT
feature type vowel = A E I O U
feature manner stop = B D P Q QH T GLOT
feature manner fricative = GH H S V
feature manner affricate = CH J TLH
feature manner nasal = M N NG
feature manner liquid = L R
feature manner glide = W Y
feature place labial = B M P V W
feature place coronal = CH D J L N R S T TLH Y
feature place dorsal = GH NG Q QH
feature place laryngeal = H GLOT
feature marked yes = D GH H Q QH S TLH GLOT

spell B = b
spell CH = ch
spell D = D
spell GH = gh
spell H = H
spell J = j
spell L = l
spell M = m
spell N = n
spell NG = ng
spell P = p
spell Q = q
spell QH = Q
spell R = r
spell S = S
spell T = t
spell TLH = tlh
spell V = v
spell W = w
spell Y = y
spell GLOT = '
spell A = a
spell E = e
spell I = I
spell O = o
spell U = u

start = NAME

rule NAME = 18: @CV . @CVC | 52: @CVC . @CVC | 10: @CV . @CVC . @CVC | 15: @CVC . @CVC . @CVC | 5: @CVC . @CVC2
rule CV = 1: @O @VOW
rule CVC = 1: @O @VOW @C
rule CVC2 = 1: @O @VOW @C2
rule O = 2: B | 2: CH | 1: D | 2: GH | 2: H | 1: J | 1: L | 1: M | 1: N | 1: NG | 1: P | 3: Q | 2: QH | 1: R | 2: S | 2: T | 2: TLH | 1: V | 1: W | 1: Y | 1: GLOT
rule C = 1: B | 2: CH | 1: D | 2: GH | 2: H | 1: J | 1: L | 1: M | 2: N | 2: NG | 1: P | 3: Q | 2: QH | 1: R | 2: S | 2: T | 2: TLH | 1: V | 1: W | 1: Y | 1: GLOT
rule C2 = 2: R GH | 1: W GLOT | 1: Y GLOT
rule VOW = 3: A | 1: E | 2: I | 3: O | 2: U

hard max marked yes 4
hard no-repeat type vowel
hard max-run type consonant 2

soft repeat type consonant 3
soft excess marked yes 2 2
soft sequence 2 [place=dorsal] [place=dorsal]
