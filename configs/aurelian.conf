# Entirely fictional luminous phonology. Contains no words, names, stems, or affixes.
segments = B D G V S H L R M N Y W A E I O U AA EE II OO UU

feature type consonant = B D G V S H L R M N Y W
feature type vowel = A E I O U AA EE II OO UU
feature manner stop = B D G
feature manner fricative = V S H
feature manner liquid = L R
feature manner nasal = M N
feature manner glide = Y W
feature place labial = B V M W
feature place coronal = D S L R N
feature place dorsal = G Y
feature place laryngeal = H
feature length long = AA EE II OO UU
feature timbre clear = E I EE II
feature timbre warm = A O U AA OO UU

spell B = b
spell D = d
spell G = g
spell V = v
spell S = s
spell H = h
spell L = l
spell R = r
spell M = m
spell N = n
spell Y = y
spell W = w
spell A = a
spell E = e
spell I = i
spell O = o
spell U = u
spell AA = ā
spell EE = ē
spell II = ī
spell OO = ō
spell UU = ū

start = NAME

rule NAME = 36: @INITIAL @CLEAR . @O @CLEAR . @O @CLEAR @TAIL | 36: @INITIAL @WARM . @O @WARM . @O @WARM @TAIL | 14: @INITIAL @CLEAR . @O @CLEAR . @O @CLEAR . @O @CLEAR @TAIL | 14: @INITIAL @WARM . @O @WARM . @O @WARM . @O @WARM @TAIL
rule INITIAL = 8: @O | 2: _ | 2: @O2
rule O = 1: B | 1: D | 1: G | 3: V | 2: S | 2: H | 6: L | 5: R | 4: M | 4: N | 3: Y | 2: W
rule O2 = 3: S L | 2: V R | 2: M Y | 2: N Y | 4: L Y | 3: R Y
rule CLEAR = 6: E | 5: I | 2: EE | 2: II
rule WARM = 6: A | 5: O | 3: U | 2: AA | 2: OO | 1: UU
rule TAIL = 20: _ | 1: L | 1: R | 1: N

hard max length long 1
hard no-repeat type vowel
hard max-run type consonant 2

soft repeat type consonant 3
soft excess manner stop 1 3
soft sequence 3 W [timbre=clear]
soft sequence 3 Y [timbre=warm]
