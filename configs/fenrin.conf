# Fictional Nordic-style phonology. Contains no words, names, or stems.
segments = B D F G H K L M N P R S T V A E I O U Y AA AE OE

feature type consonant = B D F G H K L M N P R S T V
feature type vowel = A E I O U Y AA AE OE
feature manner stop = B D G K P T
feature manner fricative = F H S V
feature manner nasal = M N
feature manner liquid = L R
feature place labial = B F M P V
feature place coronal = D L N R S T
feature place dorsal = G K
feature place laryngeal = H
feature marked yes = AA AE OE

spell AA = Å
spell AE = Ä
spell OE = Ö

start = NAME

rule NAME = 36: @O @VS . @O @VU @C1 | 4: @O @VS . @O @VU | 22: @O2 @VS . @O @VU @C1 | 12: @O @VS . @O @VU @C2 | 20: @O @VS . @O @VU . @O @VU @C1 | 2: @O @VS . @O @VU . @O @VU | 4: @O2 @VS . @O @VU . @O @VU @C1
rule O = 2: B | 2: D | 2: F | 2: G | 1: H | 3: K | 4: L | 3: M | 4: N | 1: P | 4: R | 3: S | 3: T | 2: V
rule O2 = 4: @LABSTOP @LIQ | 4: @DORSTOP @LIQ | 2: @CORSTOP R | 2: F @LIQ | 1: V R | 3: S @SSECOND | 1: K V
rule LABSTOP = 1: B | 1: P
rule DORSTOP = 1: G | 1: K
rule CORSTOP = 1: D | 1: T
rule LIQ = 1: L | 1: R
rule SSECOND = 1: P | 1: T | 1: K | 1: L | 1: M | 1: N | 1: V
rule VS = 3: A | 3: E | 2: I | 3: O | 1: U | 1: Y | 2: AA | 2: AE | 2: OE
rule VU = 3: A | 4: E | 2: I | 3: O | 1: U | 1: Y
rule C1 = 3: L | 4: N | 3: R | 3: S | 3: T | 2: K | 1: M
rule C2 = 2: N G | 2: N D | 2: R D | 1: L D | 2: R K | 2: S K | 1: L T | 1: R T

hard max marked yes 1
