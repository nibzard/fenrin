# Fictional Oceanic-style phonology. Contains no words, names, stems, or affixes.
segments = P T K F S H M N NG L R W Y GLOT A E I O U

feature type consonant = P T K F S H M N NG L R W Y GLOT
feature type vowel = A E I O U
feature manner stop = P T K GLOT
feature manner fricative = F S H
feature manner nasal = M N NG
feature manner liquid = L R
feature manner glide = W Y
feature place labial = P F M W
feature place coronal = T S N L R Y
feature place dorsal = K NG
feature place laryngeal = H GLOT
feature marked yes = NG GLOT

spell GLOT = '

start = NAME

rule NAME = 40: @INIT . @M . @M . @M | 30: @INIT . @M . @M . @M . @M | 10: @INIT . @M . @M . @M . @M . @M | 8: @INIT . @M . @DM | 8: @INIT . @M . @DM . @M | 4: @INIT . @M . @DM . @M . @M
rule INIT = 6: @O @V | 1: @V
rule M = 1: @O @V
rule DM = 1: @O @DIP
rule O = 2: P | 3: T | 3: K | 1: F | 2: S | 2: H | 4: M | 4: N | 2: NG | 4: L | 2: R | 3: W | 3: Y | 1: GLOT
rule V = 4: A | 2: E | 3: I | 4: O | 3: U
rule DIP = 4: A I | 3: A U | 2: E I | 2: O I | 3: O U | 1: I A | 1: I U | 1: U A | 1: U I

hard no-repeat type vowel
hard max-run type consonant 1
hard max-run type vowel 2
hard max marked yes 2

soft repeat type consonant 2
soft excess marked yes 1 2
