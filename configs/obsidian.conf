# Entirely fictional compact phonology. Contains no words, names, stems, or affixes.
segments = P T K Q PE TE KE QE S Z SH X QH H R L M N GLOT A I U O E

feature type consonant = P T K Q PE TE KE QE S Z SH X QH H R L M N GLOT
feature type vowel = A I U O E
feature manner stop = P T K Q PE TE KE QE GLOT
feature manner fricative = S Z SH X QH H
feature manner liquid = R L
feature manner nasal = M N
feature place labial = P PE M
feature place coronal = T TE S Z SH R L N
feature place dorsal = K KE X
feature place uvular = Q QE QH
feature place laryngeal = H GLOT
feature release ejective = PE TE KE QE
feature marked yes = Q PE TE KE QE QH GLOT

spell P = p
spell T = t
spell K = k
spell Q = q
spell PE = p'
spell TE = t'
spell KE = k'
spell QE = q'
spell S = s
spell Z = z
spell SH = sh
spell X = x
spell QH = qh
spell H = h
spell R = r
spell L = l
spell M = m
spell N = n
spell GLOT = '
spell A = a
spell I = i
spell U = u
spell O = o
spell E = e

start = NAME

rule NAME = 53: @CVC . @CVC | 12: @CCVC . @CVC | 10: @CV . @CCVC | 10: @CVC . @CVCC | 15: @CVC . @CV . @CVC
rule CV = 1: @O @V
rule CVC = 1: @O @V @C
rule CCVC = 1: @CCO @V @C
rule CVCC = 1: @O @V @CC
rule O = 2: P | 3: T | 3: K | 3: Q | 2: PE | 2: TE | 2: KE | 2: QE | 3: S | 2: Z | 2: SH | 3: X | 3: QH | 1: H | 2: R | 1: L | 1: M | 2: N | 1: GLOT
rule C = 2: T | 3: K | 3: Q | 1: PE | 1: TE | 1: KE | 1: QE | 3: S | 1: Z | 1: SH | 3: X | 2: QH | 3: R | 1: L | 3: M | 4: N | 2: GLOT
rule CCO = 3: S T | 3: S K | 2: S Q | 2: X T | 2: QH T | 3: K R | 3: Q R | 2: T R | 1: KE R | 1: QE R
rule CC = 4: N K | 3: N Q | 3: R K | 2: R Q | 3: S K | 2: S T | 2: X T | 1: QH T
rule V = 5: A | 2: I | 4: U | 3: O | 1: E

hard max release ejective 1
hard max marked yes 2
hard no-repeat type vowel
hard max-run type consonant 2
hard forbid GLOT . GLOT
hard forbid [place=uvular] [place=uvular]

soft repeat type consonant 3
soft excess marked yes 1 3
soft sequence 2 [manner=stop] [manner=stop]
